version: '3.9'

services:
  # ── INFRASTRUCTURE ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_main"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [pos_net]

  redis:
    image: redis:7-alpine
    container_name: pos_redis
    ports: ["6379:6379"]
    networks: [pos_net]

  nats:
    image: nats:2.10-alpine
    container_name: pos_nats
    ports: ["4222:4222", "8222:8222"]
    command: ["--jetstream", "--http_port", "8222"]
    networks: [pos_net]

  # ── SERVICES ────────────────────────────────────────────────────
  auth-service:
    build: { context: ./services/auth-service }
    container_name: pos_auth
    env_file: ./services/auth-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  user-service:
    build: { context: ./services/user-service }
    container_name: pos_user
    env_file: ./services/user-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  product-service:
    build: { context: ./services/product-service }
    container_name: pos_product
    env_file: ./services/product-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  order-service:
    build: { context: ./services/order-service }
    container_name: pos_order
    env_file: ./services/order-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  inventory-service:
    build: { context: ./services/inventory-service }
    container_name: pos_inventory
    env_file: ./services/inventory-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  payment-service:
    build: { context: ./services/payment-service }
    container_name: pos_payment
    env_file: ./services/payment-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  kitchen-service:
    build: { context: ./services/kitchen-service }
    container_name: pos_kitchen
    env_file: ./services/kitchen-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  notification-service:
    build: { context: ./services/notification-service }
    container_name: pos_notification
    env_file: ./services/notification-service/.env.docker
    networks: [pos_net]

  analytics-service:
    build: { context: ./services/analytics-service }
    container_name: pos_analytics
    env_file: ./services/analytics-service/.env.docker
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pos_net]

  api-gateway:
    build: { context: ./services/api-gateway }
    container_name: pos_gateway
    env_file: ./services/api-gateway/.env.docker
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks: [pos_net]

  frontend:
    build: { context: ./frontend }
    container_name: pos_frontend
    environment:
      # Used by Next.js rewrites at runtime (server → api-gateway via Docker network)
      API_GATEWAY_URL: http://api-gateway:3000
    depends_on: [api-gateway]
    networks: [pos_net]

  # ── NGINX REVERSE PROXY ─────────────────────────────────────────
  # Exposes port 80 publicly.  Routes:
  #   /api/*  →  api-gateway:3000
  #   /*      →  frontend:3010
  nginx:
    image: nginx:1.25-alpine
    container_name: pos_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-gateway
    networks: [pos_net]
    restart: unless-stopped

networks:
  pos_net:
    driver: bridge

volumes:
  postgres_data:
